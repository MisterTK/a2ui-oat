<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2UI Dashboard -- Oat Renderer Example</title>

  <!-- Oat CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script defer src="https://unpkg.com/@knadh/oat/oat.min.js"></script>

  <style>
    :root {
      --color-primary: #3B82F6;
      --color-bg: #111827;
      --color-text: #F9FAFB;
      --font-family: system-ui, sans-serif;
      --border-radius: 6px;
      --spacing: 1rem;
    }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-family);
      margin: 0;
      padding: var(--spacing);
    }
    article, section, aside {
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: var(--border-radius);
      padding: var(--spacing);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #374151; }
    th { color: #9CA3AF; font-weight: 600; }
    tr:nth-child(even) { background: #1F2937; }
    tr:nth-child(odd) { background: #111827; }
    .row { display: flex; flex-wrap: wrap; gap: var(--spacing); }
    .row.space-between { justify-content: space-between; }
    .row.center { align-items: center; }
    .col { flex: 1; min-width: 0; }
    .container { width: 100%; }
    aside { min-width: 180px; }
    aside ul { list-style: none; padding: 0; margin: 0; }
    aside ul li { margin-bottom: 0.25rem; }
    aside button {
      width: 100%; text-align: left; background: transparent;
      color: var(--color-text); border: none;
      padding: 0.5rem 0.75rem; border-radius: var(--border-radius); cursor: pointer;
    }
    aside button:hover, aside button.primary { background: #374151; }
    aside button.primary { background: var(--color-primary); color: #fff; }
    h1 { margin: 0; font-size: 1.5rem; }
    h2 { margin: 0; font-size: 1.75rem; }
    p { margin: 0 0 0.25rem 0; color: #9CA3AF; font-size: 0.875rem; }
    [data-badge] {
      display: inline-block; padding: 0.2rem 0.6rem;
      border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }
    [data-badge].success { background: #065F46; color: #6EE7B7; }
    [data-badge].info { background: #1E3A5F; color: #93C5FD; }
    [data-badge].error { background: #7F1D1D; color: #FCA5A5; }
    [data-badge].warning { background: #78350F; color: #FCD34D; }
    progress {
      width: 100%; height: 8px; border-radius: 4px;
      appearance: none; -webkit-appearance: none;
    }
    progress::-webkit-progress-bar { background: #374151; border-radius: 4px; }
    progress::-webkit-progress-value { background: var(--color-primary); border-radius: 4px; }
    progress::-moz-progress-bar { background: var(--color-primary); border-radius: 4px; }
    [role="alert"] {
      padding: 0.75rem 1rem; border-radius: var(--border-radius);
      font-size: 0.875rem; margin-top: var(--spacing);
    }
    [role="alert"].warning { background: #78350F; color: #FCD34D; border: 1px solid #92400E; }
    [role="alert"].error { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
    [role="alert"].success { background: #065F46; color: #6EE7B7; border: 1px solid #047857; }
    nav[aria-label="breadcrumb"] ol {
      list-style: none; display: flex; gap: 0.5rem;
      padding: 0; margin: var(--spacing) 0 0 0; font-size: 0.875rem; color: #9CA3AF;
    }
    nav[aria-label="breadcrumb"] li + li::before { content: "/"; margin-right: 0.5rem; color: #4B5563; }
    nav[aria-label="breadcrumb"] a { color: var(--color-primary); text-decoration: none; }
    nav[aria-label="breadcrumb"] a:hover { text-decoration: underline; }
    #surface { max-width: 1200px; margin: 0 auto; }
    .status-cell.healthy { color: #6EE7B7; }
    .status-cell.warning { color: #FCD34D; }
    .status-cell.degraded { color: #FCA5A5; }
    .flash { animation: flash 0.6s ease-out; }
    @keyframes flash {
      0% { background: rgba(59,130,246,0.3); }
      100% { background: transparent; }
    }
  </style>
</head>
<body>

<div id="surface"></div>
<div id="controls" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #374151;">
  <p style="color: #6B7280; font-size: 0.75rem;">Data binding demo: click the button below to simulate an updateDataModel message.</p>
  <button onclick="simulateDataUpdate()" style="margin-top:0.5rem; background:var(--color-primary); color:#fff; border:none; padding:0.5rem 1rem; border-radius:var(--border-radius); cursor:pointer;">
    Simulate Data Update
  </button>
</div>

<script type="module">
// ---------------------------------------------------------------------------
// Import the real OatRenderer from the npm package via CDN
// ---------------------------------------------------------------------------
import { OatRenderer } from 'https://unpkg.com/a2ui-oat/renderer/index.js';

const renderer = new OatRenderer();

// ---------------------------------------------------------------------------
// A2UI message processing — same pattern used by ADK agent examples
// ---------------------------------------------------------------------------
let dataModel = {};
let componentMap = {};

function deepMerge(target, source) {
  const out = { ...target };
  for (const k of Object.keys(source)) {
    if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])
        && target[k] && typeof target[k] === 'object' && !Array.isArray(target[k])) {
      out[k] = deepMerge(target[k], source[k]);
    } else {
      out[k] = source[k];
    }
  }
  return out;
}

function createContext() {
  const ctx = {
    getDataModel: () => dataModel,
    setDataModel: (path, val) => {
      const segs = path.replace(/^\//, '').split(/[/.]/);
      let obj = dataModel;
      for (let i = 0; i < segs.length - 1; i++) obj = obj[segs[i]] = obj[segs[i]] || {};
      obj[segs[segs.length - 1]] = val;
    },
    subscribe: () => () => {},
    renderChild: (id) => {
      const comp = componentMap[id];
      return comp ? renderer.renderComponent(comp, ctx) : null;
    },
    dispatchAction: (action) => console.log('[A2UI] Action:', action),
    getRegisteredFunction: () => null,
  };
  return ctx;
}

function applyTheme(theme) {
  if (!theme) return;
  const map = {
    primaryColor: '--color-primary', backgroundColor: '--color-bg',
    textColor: '--color-text', fontFamily: '--font-family',
    borderRadius: '--border-radius', spacing: '--spacing',
  };
  for (const [key, cssVar] of Object.entries(map)) {
    if (theme[key]) document.documentElement.style.setProperty(cssVar, theme[key]);
  }
  if (theme.mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
}

function processMessages(messages) {
  for (const msg of messages) {
    if (msg.createSurface) applyTheme(msg.createSurface.theme);
    if (msg.updateComponents) {
      for (const c of msg.updateComponents.components) componentMap[c.id] = c;
    }
    if (msg.updateDataModel) {
      dataModel = deepMerge(dataModel, msg.updateDataModel.data);
    }
  }
  render();
}

function render() {
  const root = componentMap['root-grid'];
  if (!root) return;
  const target = document.getElementById('surface');
  target.innerHTML = '';
  target.appendChild(renderer.renderComponent(root, createContext()));
}

// ---------------------------------------------------------------------------
// Bootstrap: load agent-output.json and render via OatRenderer
// ---------------------------------------------------------------------------
fetch('agent-output.json')
  .then(res => res.json())
  .then(messages => processMessages(messages))
  .catch(err => {
    document.getElementById('surface').textContent =
      'Failed to load agent-output.json. Serve this directory with a local HTTP server (e.g. npx serve .).';
    console.error(err);
  });

// ---------------------------------------------------------------------------
// Data binding demo: simulate an updateDataModel message
// ---------------------------------------------------------------------------
const BASELINE_ERRORS = 342;
const BASELINE_REQUESTS = 1284503;

function simulateDataUpdate() {
  const newErrors = Math.floor(Math.random() * 500);
  const newCpu = Math.floor(Math.random() * 100);
  const errorDelta = ((newErrors - BASELINE_ERRORS) / BASELINE_ERRORS * 100).toFixed(1);
  const updateMsg = {
    updateDataModel: {
      data: {
        metrics: {
          errors: String(newErrors),
          errorsTrend: (newErrors > BASELINE_ERRORS ? '+' : '') + errorDelta + '%',
          requests: (BASELINE_REQUESTS + Math.floor(Math.random() * 10000)).toLocaleString(),
        },
        tableData: {
          rows: [
            { name: 'api-gateway-01', status: 'Healthy', cpu: newCpu, memory: 67 },
            { name: 'api-gateway-02', status: 'Healthy', cpu: 38, memory: 61 },
            { name: 'worker-pool-01', status: newCpu > 80 ? 'Warning' : 'Healthy', cpu: Math.min(newCpu + 40, 99), memory: 82 },
            { name: 'worker-pool-02', status: 'Healthy', cpu: 23, memory: 45 },
            { name: 'cache-redis-01', status: 'Healthy', cpu: 15, memory: 72 },
            { name: 'db-primary', status: 'Healthy', cpu: 55, memory: 78 },
            { name: 'db-replica-01', status: 'Healthy', cpu: 31, memory: 54 },
            { name: 'db-replica-02', status: newErrors > 400 ? 'Degraded' : 'Healthy', cpu: 91, memory: 93 },
          ],
        },
      },
    },
  };
  processMessages([updateMsg]);
  document.getElementById('surface').classList.add('flash');
  setTimeout(() => document.getElementById('surface').classList.remove('flash'), 600);
}

window.simulateDataUpdate = simulateDataUpdate;
</script>
</body>
</html>

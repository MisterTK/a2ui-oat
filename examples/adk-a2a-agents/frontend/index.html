<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADK A2A Multi-Agent -- Oat Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script defer src="https://unpkg.com/@knadh/oat/oat.min.js"></script>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --glass-hover: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --accent: #7dd3fc;
      --bg-gradient: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      --badge-error-text: #f87171;
      --badge-info-bg: rgba(59, 130, 246, 0.15);
      --badge-info-text: #60a5fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-secondary);
      min-height: 100vh;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.3rem; color: var(--text-primary); }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: var(--badge-info-bg);
      color: var(--badge-info-text);
      border: 1px solid rgba(59, 130, 246, 0.3);
      margin-left: 0.75rem;
    }
    header button {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    header button:hover { background: var(--glass-hover); color: var(--text-primary); }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .input-row input {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    .input-row input::placeholder { color: var(--text-muted); }
    .input-row input:focus { border-color: var(--accent); }
    .input-row button {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      padding: 0.7rem 1.25rem;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .input-row button:hover { filter: brightness(1.1); }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .prompt-hints {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .prompt-hint {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 0.3rem 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .prompt-hint:hover { background: var(--glass-hover); color: var(--text-primary); }

    .surfaces {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .surface-container {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      min-height: 200px;
      box-shadow: var(--glass-shadow);
    }
    .surface-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .surface-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .surface-text {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .surface-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem 0;
    }

    #log {
      margin-top: 1.5rem;
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: #cdd6f4;
      border-radius: 16px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: var(--glass-shadow);
    }
    #log .step { color: #89b4fa; }
    #log .ok   { color: #a6e3a1; }
    #log .warn { color: #f9e2af; }
    #log .err  { color: #f38ba8; }

    .loading-bar {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%;
      animation: loadSlide 1.5s infinite;
      border-radius: 2px;
      margin-bottom: 1rem;
      display: none;
    }
    .loading-bar.active { display: block; }
    @keyframes loadSlide { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .surfaces { grid-template-columns: 1fr; }
    }

    /* Ensure rendered content is light on dark */
    .surface-container * {
      color: var(--text-secondary, #a0aec0);
    }
    .surface-container h1, .surface-container h2, .surface-container h3 {
      color: var(--text-primary, #ffffff);
    }
  </style>
</head>
<body>

  <header>
    <div style="display:flex;align-items:center">
      <h1>A2A Multi-Agent Dashboard</h1>
      <span class="tag">Orchestrator + 2 Sub-agents</span>
    </div>
    <button onclick="resetSession()">Reset</button>
  </header>

  <div class="prompt-hints" id="hints">
    <span class="prompt-hint" onclick="sendHint(this)">Show me the full dashboard</span>
    <span class="prompt-hint" onclick="sendHint(this)">Show system metrics</span>
    <span class="prompt-hint" onclick="sendHint(this)">Show active incidents</span>
    <span class="prompt-hint" onclick="sendHint(this)">What is the current system status?</span>
  </div>

  <div class="input-row">
    <input type="text" id="msg-input" placeholder="Ask about metrics, incidents, or request a full dashboard..."
           onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" id="send-btn">Send</button>
  </div>

  <div class="loading-bar" id="loading-bar"></div>

  <div class="surfaces">
    <div class="surface-container">
      <div class="surface-label"><span class="dot"></span> Metrics Agent</div>
      <div id="surface-metrics"><div class="surface-empty">Waiting for request...</div></div>
    </div>
    <div class="surface-container">
      <div class="surface-label"><span class="dot" style="background:#f87171"></span> Incidents Agent</div>
      <div id="surface-incidents"><div class="surface-empty">Waiting for request...</div></div>
    </div>
  </div>

  <div id="log"></div>

<script type="module">
import { OatRenderer } from '../../../renderer/index.js';

const renderer = new OatRenderer();

// ---------------------------------------------------------------------------
// RenderContext shim (lightweight stand-in for @a2ui/web-lib)
// ---------------------------------------------------------------------------

function createContext(components, dataModel) {
  return {
    getDataModel: () => dataModel,
    setDataModel: (path, val) => {
      const segs = path.replace(/^\//, '').split(/[/.]/);
      let obj = dataModel;
      for (let i = 0; i < segs.length - 1; i++) {
        obj = obj[segs[i]] = obj[segs[i]] || {};
      }
      obj[segs[segs.length - 1]] = val;
    },
    subscribe: () => () => {},
    renderChild: (id) => {
      const comp = components.get(id);
      return comp ? renderer.renderComponent(comp, createContext(components, dataModel)) : null;
    },
    dispatchAction: (action) => console.log('Action:', action),
    getRegisteredFunction: () => null,
  };
}

// ---------------------------------------------------------------------------
// A2UI Message Processing
// ---------------------------------------------------------------------------

function deepMerge(target, source) {
  const out = { ...target };
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])
        && target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
      out[key] = deepMerge(target[key], source[key]);
    } else {
      out[key] = source[key];
    }
  }
  return out;
}

function normalizeComponent(c) {
  if (!c.component && c.type) c.component = c.type;
  if (c.properties) {
    const props = c.properties;
    delete c.properties;
    Object.assign(c, props);
  }
  if (c.children && !Array.isArray(c.children)) c.children = [c.children];
  if (c.children && c.children.length > 0 && typeof c.children[0] === 'object') {
    const inlined = [];
    c.children = c.children.map(ch => {
      if (typeof ch === 'object' && ch.id) { inlined.push(normalizeComponent(ch)); return ch.id; }
      return ch;
    });
    c._inlined = inlined;
  }
  return c;
}

function renderA2UI(messages) {
  let data = {};
  let components = [];
  for (const msg of messages) {
    if (msg.updateDataModel) {
      const dm = msg.updateDataModel;
      let modelData = dm.data || dm.value || {};
      if (dm.path && dm.path !== '/' && dm.value) {
        const key = dm.path.replace(/^\//, '');
        modelData = { [key]: dm.value };
      }
      data = deepMerge(data, modelData);
    }
    if (msg.updateComponents && msg.updateComponents.components) {
      const normalized = msg.updateComponents.components.map(normalizeComponent);
      for (const c of normalized) {
        components.push(c);
        if (c._inlined) { for (const ic of c._inlined) components.push(ic); delete c._inlined; }
      }
    }
  }
  if (components.length === 0) return null;

  const cMap = new Map(components.map(c => [c.id, c]));
  const childIds = new Set();
  for (const c of components) {
    for (const cid of (c.children || [])) childIds.add(cid);
    if (c.child) childIds.add(c.child);
    if (c.content ?? c.contentChild) childIds.add(c.content ?? c.contentChild);
  }
  const root = components.find(c => !childIds.has(c.id)) || components[0];
  const ctx = createContext(cMap, data);
  return renderer.renderComponent(root, ctx);
}


// ---------------------------------------------------------------------------
// Chat / Orchestration Logic
// ---------------------------------------------------------------------------

const logEl = document.getElementById('log');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const loadingBar = document.getElementById('loading-bar');

function log(msg, cls = 'step') {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  msgInput.value = '';
  sendBtn.disabled = true;
  loadingBar.classList.add('active');
  document.getElementById('hints').style.display = 'none';

  log(`User: ${text}`);

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const result = await resp.json();

    log(`Received responses from: ${result.agents.join(', ')}`, 'ok');

    // Render each agent's surface
    for (const [agentName, surfaceData] of Object.entries(result.surfaces || {})) {
      let targetEl = null;

      if (agentName.includes('metric')) {
        targetEl = document.getElementById('surface-metrics');
      } else if (agentName.includes('incident')) {
        targetEl = document.getElementById('surface-incidents');
      } else {
        // Orchestrator text or unknown agent -- show in both if it has A2UI
        if (surfaceData.a2ui && surfaceData.a2ui.length > 0) {
          // Try to render in first available surface
          targetEl = document.getElementById('surface-metrics');
        } else {
          log(`  ${agentName}: ${surfaceData.text || '(no content)'}`, 'warn');
          continue;
        }
      }

      if (targetEl) {
        targetEl.innerHTML = '';

        if (surfaceData.text) {
          const textDiv = document.createElement('div');
          textDiv.className = 'surface-text';
          textDiv.textContent = surfaceData.text;
          targetEl.appendChild(textDiv);
        }

        if (surfaceData.a2ui && surfaceData.a2ui.length > 0) {
          try {
            const rendered = renderA2UI(surfaceData.a2ui);
            if (rendered) {
              targetEl.appendChild(rendered);
              log(`  ${agentName}: rendered ${surfaceData.a2ui.length} A2UI messages`, 'ok');
            } else {
              targetEl.innerHTML += '<div class="surface-empty">No components rendered</div>';
              log(`  ${agentName}: no renderable components`, 'warn');
            }
          } catch (e) {
            targetEl.innerHTML += `<div style="color:var(--badge-error-text)">Render error: ${e.message}</div><pre style="font-size:0.7rem;color:var(--text-muted);overflow:auto;max-height:200px">${JSON.stringify(surfaceData.a2ui, null, 2)}</pre>`;
            log(`  ${agentName}: render error: ${e.message}`, 'err');
          }
        } else if (!surfaceData.text) {
          targetEl.innerHTML = '<div class="surface-empty">No A2UI data returned</div>';
        }
      }
    }
  } catch (err) {
    log(`Error: ${err.message}`, 'err');
  }

  loadingBar.classList.remove('active');
  sendBtn.disabled = false;
  msgInput.focus();
}

function sendHint(el) {
  msgInput.value = el.textContent;
  sendMessage();
}

async function resetSession() {
  await fetch('/api/reset', { method: 'POST' });
  document.getElementById('surface-metrics').innerHTML = '<div class="surface-empty">Waiting for request...</div>';
  document.getElementById('surface-incidents').innerHTML = '<div class="surface-empty">Waiting for request...</div>';
  logEl.innerHTML = '';
  document.getElementById('hints').style.display = 'flex';
}

// Expose to inline onclick handlers
window.sendMessage = sendMessage;
window.sendHint = sendHint;
window.resetSession = resetSession;
</script>
</body>
</html>

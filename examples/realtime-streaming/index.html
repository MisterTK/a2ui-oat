<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a2ui-oat: Realtime Streaming Example</title>

  <!-- Oat CSS -->
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <style>
    #surface { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #surface > .col-1 > .col-1 { margin-bottom: 1.5rem; }
    #surface progress, #surface meter { width: 100%; height: 1.5rem; display: block; }
  </style>
</head>
<body>

  <header style="max-width: 720px; margin: 2rem auto; padding: 0 1rem;">
    <h1>Realtime Streaming Metrics</h1>
    <p>
      Demonstrates the <strong>subscribeSSE</strong> registered function pattern from the
      <a href="../../docs/architecture.md">a2ui-oat architecture</a> (Section 6.5).
      The agent creates the surface once with bound components; the client opens an
      EventSource and keeps everything updated indefinitely with zero agent involvement.
    </p>
    <hr>
  </header>

  <!-- Surface root -->
  <div id="surface"></div>

  <!--
    Embedded A2UI agent-output JSON.
    In production this arrives via A2A / MCP / SSE transport.
  -->
  <script type="application/json" id="agent-output">
  {
    "version": "v0.9",
    "createSurface": {
      "surfaceId": "metrics-dashboard",
      "catalogId": "https://unpkg.com/a2ui-oat/catalog/oat-catalog.json",
      "theme": { "mode": "dark" },
      "sendDataModel": true
    },
    "updateComponents": {
      "surfaceId": "metrics-dashboard",
      "components": [
        {
          "id": "root",
          "component": "Column",
          "children": ["cpu-group", "memory-group", "errors-group", "requests-group", "uptime-group", "error-alert"],
          "action": {
            "functionCall": {
              "call": "subscribeSSE",
              "args": {
                "url": "http://localhost:3002/metrics/stream",
                "targetPath": "/liveMetrics"
              }
            }
          }
        },
        { "id": "cpu-group",      "component": "Column", "children": ["cpu-label", "cpu-bar"] },
        { "id": "cpu-label",      "component": "Text",   "text": "CPU Usage",     "variant": "h3" },
        { "id": "cpu-bar",        "component": "Progress","value": { "path": "/liveMetrics/cpu" }, "max": 100 },

        { "id": "memory-group",   "component": "Column", "children": ["memory-label", "memory-bar"] },
        { "id": "memory-label",   "component": "Text",   "text": "Memory Usage",  "variant": "h3" },
        { "id": "memory-bar",     "component": "Meter",  "value": { "path": "/liveMetrics/memory" }, "min": 0, "max": 100, "low": 30, "high": 80 },

        { "id": "errors-group",   "component": "Column", "children": ["errors-label", "errors-badge"] },
        { "id": "errors-label",   "component": "Text",   "text": "Error Count",   "variant": "h3" },
        { "id": "errors-badge",   "component": "Badge",  "text": { "path": "/liveMetrics/errors" }, "variant": "info" },

        { "id": "requests-group", "component": "Column", "children": ["requests-label", "requests-value"] },
        { "id": "requests-label", "component": "Text",   "text": "Total Requests","variant": "h3" },
        { "id": "requests-value", "component": "Text",   "text": { "path": "/liveMetrics/requestsFormatted" }, "variant": "p" },

        { "id": "uptime-group",   "component": "Column", "children": ["uptime-label", "uptime-value"] },
        { "id": "uptime-label",   "component": "Text",   "text": "Uptime",        "variant": "h3" },
        { "id": "uptime-value",   "component": "Text",   "text": { "path": "/liveMetrics/uptimeFormatted" }, "variant": "p" },

        { "id": "error-alert",   "component": "Alert",  "text": { "path": "/liveMetrics/alertMessage" }, "variant": "error" }
      ]
    },
    "updateDataModel": {
      "surfaceId": "metrics-dashboard",
      "data": {
        "liveMetrics": {
          "cpu": 0,
          "memory": 0,
          "errors": 0,
          "requestsFormatted": "0",
          "uptimeFormatted": "0s",
          "alertMessage": ""
        }
      }
    }
  }
  </script>

  <script type="module">
    import { OatRenderer } from '../../renderer/index.js';

    const ERROR_THRESHOLD = 60;

    // Parse embedded A2UI output
    const agentOutput = JSON.parse(document.getElementById('agent-output').textContent);
    const components = {};
    for (const comp of agentOutput.updateComponents.components) {
      components[comp.id] = comp;
    }
    const dataModel = agentOutput.updateDataModel.data;

    const renderer = new OatRenderer();
    const surface = document.getElementById('surface');

    function createContext() {
      return {
        getDataModel: () => dataModel,
        setDataModel: (path, val) => {
          const segs = path.replace(/^\//, '').split(/[/.]/);
          let obj = dataModel;
          for (let i = 0; i < segs.length - 1; i++) {
            obj = obj[segs[i]] = obj[segs[i]] || {};
          }
          obj[segs[segs.length - 1]] = val;
        },
        subscribe: () => () => {},
        renderChild: (id) => {
          const comp = components[id];
          return comp ? renderer.renderComponent(comp, ctx) : null;
        },
        dispatchAction: (action) => console.log('Action:', action),
        getRegisteredFunction: () => null,
      };
    }

    let ctx;

    function renderSurface() {
      ctx = createContext();
      const root = components['root'];
      if (!root) return;
      const el = renderer.renderComponent(root, ctx);
      surface.replaceChildren(el || document.createTextNode(''));

      // Toggle alert visibility — Oat renders an empty Alert as a blank box
      const alertEl = surface.querySelector('[role="alert"]');
      if (alertEl) alertEl.style.display = dataModel.liveMetrics.alertMessage ? '' : 'none';
    }

    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return [h > 0 ? `${h}h` : null, m > 0 ? `${m}m` : null, `${s}s`].filter(Boolean).join(' ');
    }

    // Registered function: subscribeSSE
    function subscribeSSE(url) {
      const source = new EventSource(url);

      source.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          const m = dataModel.liveMetrics;
          m.cpu = data.cpu;
          m.memory = data.memory;
          m.errors = data.errors;
          m.requestsFormatted = data.requests.toLocaleString();
          m.uptimeFormatted = formatUptime(data.uptime);
          m.alertMessage = data.errors >= ERROR_THRESHOLD
            ? `Error count is high (${data.errors})! Investigate immediately.`
            : '';
          renderSurface();
        } catch {
          console.error('Failed to parse SSE event:', event.data);
        }
      };

      source.onerror = () => {
        console.warn('SSE connection lost. Reconnecting...');
        surface.style.opacity = '0.5';
      };

      source.onopen = () => {
        surface.style.opacity = '';
      };

      return source;
    }

    renderSurface();
    subscribeSSE('http://localhost:3002/metrics/stream');
  </script>
</body>
</html>

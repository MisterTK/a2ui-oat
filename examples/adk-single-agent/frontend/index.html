<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADK Single Agent -- Oat Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script defer src="https://unpkg.com/@knadh/oat/oat.min.js"></script>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --glass-hover: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --accent: #7dd3fc;
      --bg-gradient: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      --badge-error-text: #f87171;
      --badge-info-bg: rgba(59, 130, 246, 0.15);
      --badge-info-text: #60a5fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-secondary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    header h1 {
      font-size: 1.1rem;
      color: var(--text-primary);
      font-weight: 600;
    }
    header .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: var(--badge-info-bg);
      color: var(--badge-info-text);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    header button {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    header button:hover {
      background: var(--glass-hover);
      color: var(--text-primary);
    }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .message {
      max-width: 90%;
    }
    .message.user {
      align-self: flex-end;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 16px 16px 4px 16px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .message.agent {
      align-self: flex-start;
      width: 100%;
      max-width: 100%;
    }
    .agent-text {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .agent-surface {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--glass-shadow);
    }
    .agent-raw-toggle {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .agent-raw-toggle:hover { color: var(--accent); }
    .agent-raw {
      display: none;
      margin-top: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .loading {
      align-self: flex-start;
      display: flex;
      gap: 6px;
      padding: 0.75rem 1rem;
    }
    .loading span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite both;
    }
    .loading span:nth-child(2) { animation-delay: 0.16s; }
    .loading span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      display: flex;
      gap: 0.75rem;
    }
    #input-area input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
    }
    #input-area input::placeholder { color: var(--text-muted); }
    #input-area input:focus { border-color: var(--accent); }
    #input-area button {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      padding: 0.7rem 1.25rem;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #input-area button:hover { filter: brightness(1.1); }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .prompt-hints {
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .prompt-hint {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 0.3rem 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .prompt-hint:hover {
      background: var(--glass-hover);
      color: var(--text-primary);
    }

    /* Dark-theme overrides for rendered content */
    .agent-surface * {
      color: var(--text-secondary, #a0aec0);
    }
    .agent-surface h1, .agent-surface h2, .agent-surface h3, .agent-surface h4 {
      color: var(--text-primary, #ffffff);
    }
    table { border-collapse: collapse; width: 100%; }
    table th {
      color: var(--text-secondary, #a0aec0) !important;
      background: rgba(255,255,255,0.05) !important;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    table td {
      color: var(--text-secondary, #a0aec0) !important;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    table tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }
  </style>
</head>
<body>

  <header>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <h1>ADK Dashboard Agent</h1>
      <span class="tag">Gemini 3 Flash Preview + A2UI-Oat Catalog</span>
    </div>
    <button onclick="resetSession()">Reset Session</button>
  </header>

  <div class="prompt-hints" id="hints">
    <span class="prompt-hint" onclick="sendHint(this)">Show me a system dashboard</span>
    <span class="prompt-hint" onclick="sendHint(this)">Show CPU and memory metrics</span>
    <span class="prompt-hint" onclick="sendHint(this)">Create an incident tracker table</span>
    <span class="prompt-hint" onclick="sendHint(this)">Build a team overview dashboard</span>
  </div>

  <div id="chat-area"></div>

  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Ask for a dashboard..." autocomplete="off"
           onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMessage()">
    <button onclick="sendMessage()" id="send-btn">Send</button>
  </div>

<script type="module">
import { OatRenderer } from '../../../renderer/index.js';

const renderer = new OatRenderer();

// ---------------------------------------------------------------------------
// A2UI Component Rendering via OatRenderer
// ---------------------------------------------------------------------------

function normalizeComponent(c) {
  if (!c.component && c.type) c.component = c.type;
  if (c.properties) {
    const props = c.properties;
    delete c.properties;
    Object.assign(c, props);
  }
  if (c.children && !Array.isArray(c.children)) c.children = [c.children];
  if (c.children && c.children.length > 0 && typeof c.children[0] === 'object') {
    const inlined = [];
    c.children = c.children.map(ch => {
      if (typeof ch === 'object' && ch.id) { inlined.push(normalizeComponent(ch)); return ch.id; }
      return ch;
    });
    c._inlined = inlined;
  }
  return c;
}

function createContext(components, dataModel) {
  const ctx = {
    getDataModel: () => dataModel,
    setDataModel: (path, val) => {
      const segs = path.replace(/^\//, '').split(/[/.]/);
      let obj = dataModel;
      for (let i = 0; i < segs.length - 1; i++) {
        obj = obj[segs[i]] = obj[segs[i]] || {};
      }
      obj[segs[segs.length - 1]] = val;
    },
    subscribe: (path, cb) => () => {},
    renderChild: (id) => {
      const comp = components[id];
      return comp ? renderer.renderComponent(comp, ctx) : null;
    },
    dispatchAction: (action) => {
      console.log('Action dispatched:', action);
    },
    getRegisteredFunction: (name) => null,
  };
  return ctx;
}

function deepMerge(target, source) {
  const out = { ...target };
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])
        && target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
      out[key] = deepMerge(target[key], source[key]);
    } else {
      out[key] = source[key];
    }
  }
  return out;
}

function renderA2UI(messages) {
  let data = {};
  let components = [];

  for (const msg of messages) {
    if (msg.updateDataModel) {
      const dm = msg.updateDataModel;
      let modelData = dm.data || dm.value || {};
      if (dm.path && dm.path !== '/' && dm.value) {
        const key = dm.path.replace(/^\//, '');
        modelData = { [key]: dm.value };
      }
      data = deepMerge(data, modelData);
    }
    if (msg.updateComponents && msg.updateComponents.components) {
      const normalized = msg.updateComponents.components.map(normalizeComponent);
      for (const c of normalized) {
        components.push(c);
        if (c._inlined) { for (const ic of c._inlined) components.push(ic); delete c._inlined; }
      }
    }
  }

  if (components.length === 0) return null;

  // Build component lookup map
  const cMap = {};
  for (const c of components) {
    cMap[c.id] = c;
  }

  // Find root component (not referenced as a child by any other component)
  const childIds = new Set();
  for (const c of components) {
    for (const cid of (c.children || [])) childIds.add(cid);
    if (c.child) childIds.add(c.child);
    if (c.content ?? c.contentChild) childIds.add(c.content ?? c.contentChild);
    if (c.trigger ?? c.entryPointChild) childIds.add(c.trigger ?? c.entryPointChild);
  }
  const root = components.find(c => !childIds.has(c.id)) || components[0];

  const ctx = createContext(cMap, data);
  return renderer.renderComponent(root, ctx);
}


// ---------------------------------------------------------------------------
// Chat Logic
// ---------------------------------------------------------------------------

const chatArea = document.getElementById('chat-area');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const hints = document.getElementById('hints');

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-indicator');
  if (el) el.remove();
}

function addAgentResponse(text, a2uiMessages, raw) {
  const wrap = document.createElement('div');
  wrap.className = 'message agent';

  if (text) {
    const textEl = document.createElement('div');
    textEl.className = 'agent-text';
    textEl.textContent = text;
    wrap.appendChild(textEl);
  }

  if (a2uiMessages && a2uiMessages.length > 0) {
    const surface = document.createElement('div');
    surface.className = 'agent-surface';
    try {
      const rendered = renderA2UI(a2uiMessages);
      if (rendered) surface.appendChild(rendered);
      else surface.textContent = 'No components rendered';
    } catch (e) {
      surface.innerHTML = `<div style="color:var(--badge-error-text)">Render error: ${e.message}</div><pre style="font-size:0.7rem;color:var(--text-muted);overflow:auto;max-height:200px">${JSON.stringify(a2uiMessages, null, 2)}</pre>`;
    }
    wrap.appendChild(surface);
  }

  // Raw toggle
  if (raw) {
    const toggleId = 'raw-' + Date.now();
    const toggle = document.createElement('div');
    toggle.className = 'agent-raw-toggle';
    toggle.textContent = 'Show raw response';
    toggle.onclick = () => {
      const rawEl = document.getElementById(toggleId);
      if (rawEl.style.display === 'none') {
        rawEl.style.display = 'block';
        toggle.textContent = 'Hide raw response';
      } else {
        rawEl.style.display = 'none';
        toggle.textContent = 'Show raw response';
      }
    };
    wrap.appendChild(toggle);

    const rawEl = document.createElement('pre');
    rawEl.className = 'agent-raw';
    rawEl.id = toggleId;
    rawEl.textContent = raw;
    wrap.appendChild(rawEl);
  }

  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  msgInput.value = '';
  sendBtn.disabled = true;
  addUserMessage(text);
  addLoading();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const result = await resp.json();
    removeLoading();

    if (result.error) {
      addAgentResponse('Error: ' + result.error, [], null);
    } else {
      addAgentResponse(result.text, result.a2ui, result.raw);
    }
  } catch (err) {
    removeLoading();
    addAgentResponse('Failed to reach server: ' + err.message, [], null);
  }

  sendBtn.disabled = false;
  msgInput.focus();
}

function sendHint(el) {
  msgInput.value = el.textContent;
  sendMessage();
}

async function resetSession() {
  await fetch('/api/reset', { method: 'POST' });
  chatArea.innerHTML = '';
  hints.style.display = 'flex';
}

// Expose functions to inline event handlers
window.sendMessage = sendMessage;
window.sendHint = sendHint;
window.resetSession = resetSession;
</script>
</body>
</html>

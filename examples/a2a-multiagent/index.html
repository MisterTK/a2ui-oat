<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2A Multi-Agent Example -- a2ui-oat</title>

  <!-- Oat CSS & JS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --glass-hover: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --accent: #7dd3fc;
      --accent-hover: #38bdf8;
      --bg-gradient: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-secondary);
      min-height: 100vh;
    }
    h1 { margin-top: 0; color: var(--text-primary); }
    h2, h3, h4 { color: var(--text-primary); }
    p { color: var(--text-secondary); }
    a { color: var(--accent); }
    a:hover { color: var(--accent-hover); }

    .surfaces {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .surface-container {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      min-height: 200px;
      box-shadow: var(--glass-shadow);
    }
    .surface-container h3 {
      margin-top: 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Status log at the bottom -- keep dark styling */
    #log {
      margin-top: 2rem;
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: #cdd6f4;
      border-radius: 16px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: var(--glass-shadow);
    }
    #log .step { color: #89b4fa; }
    #log .ok   { color: #a6e3a1; }
    #log .warn { color: #f9e2af; }
    #log .err  { color: #f38ba8; }

    @media (max-width: 768px) {
      .surfaces { grid-template-columns: 1fr; }
    }

    /* Ensure all A2UI rendered content is light on dark */
    #surface *, .agent-surface *, #surface-basic *, #surface-oat *,
    .surface-container *, #metrics-surface *, #incidents-surface * {
      color: var(--text-secondary, #a0aec0);
    }
    #surface h1, #surface h2, #surface h3, #surface h4,
    .agent-surface h1, .agent-surface h2, .agent-surface h3, .agent-surface h4,
    #surface-basic h1, #surface-basic h2, #surface-basic h3,
    #surface-oat h1, #surface-oat h2, #surface-oat h3,
    .surface-container h1, .surface-container h2, .surface-container h3 {
      color: var(--text-primary, #ffffff);
    }
    table { border-collapse: collapse; width: 100%; }
    table th {
      color: var(--text-secondary, #a0aec0) !important;
      background: rgba(255,255,255,0.05) !important;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    table td {
      color: var(--text-secondary, #a0aec0) !important;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    table tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }
  </style>
</head>
<body>

  <h1>A2A Multi-Agent Example</h1>
  <p>
    Demonstrates A2A integration with catalog negotiation (Section 9).
    Two agents create independent surfaces rendered side by side.
  </p>

  <div class="surfaces">
    <div class="surface-container">
      <h3>Surface: metrics-surface (Agent A)</h3>
      <div id="surface-metrics"></div>
    </div>
    <div class="surface-container">
      <h3>Surface: incidents-surface (Agent B)</h3>
      <div id="surface-incidents"></div>
    </div>
  </div>

  <div id="log"></div>

  <script type="module">
    import { OatRenderer } from '../../renderer/index.js';

    const AGENTS_BASE = "http://localhost:3100";
    const OAT_CATALOG_ID = "https://a2ui-oat.dev/catalog/v1/oat-catalog.json";

    const logEl = document.getElementById("log");
    const renderer = new OatRenderer();

    function log(msg, cls = "step") {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // -----------------------------------------------------------------------
    // Step 1: Discover agents (read AgentCards)
    // -----------------------------------------------------------------------

    async function discoverAgent(cardUrl) {
      log(`Discovering agent at ${cardUrl} ...`);
      const resp = await fetch(`${AGENTS_BASE}${cardUrl}`);
      if (!resp.ok) throw new Error(`Discovery failed: ${resp.status}`);
      const card = await resp.json();
      log(`  Found: "${card.name}"`, "ok");

      // Check A2UI extension
      const a2uiExt = card.extensions?.find((e) =>
        e.uri.includes("a2ui")
      );
      if (a2uiExt) {
        const catalogs = a2uiExt.params?.supportedCatalogIds ?? [];
        log(`  Supported catalogs: ${catalogs.join(", ")}`, "ok");
        if (a2uiExt.params?.acceptsInlineCatalogs) {
          log(`  Accepts inline catalogs: yes`, "ok");
        }
      }
      return card;
    }

    // -----------------------------------------------------------------------
    // Step 2: Send message with catalog negotiation (Section 9.2)
    // -----------------------------------------------------------------------

    async function sendMessage(agentUrl, card) {
      log(`Sending message to "${card.name}" ...`);

      // Build metadata with supportedCatalogIds
      const metadata = {
        "v0.9": {
          supportedCatalogIds: [OAT_CATALOG_ID],
        },
      };

      // If agent accepts inline catalogs, include a stub catalog (Section 9.4)
      const a2uiExt = card.extensions?.find((e) => e.uri.includes("a2ui"));
      if (a2uiExt?.params?.acceptsInlineCatalogs) {
        log(`  Including inline catalog for "${card.name}" (Section 9.4)`, "warn");
        metadata["v0.9"].inlineCatalogs = [
          {
            catalogId: OAT_CATALOG_ID,
            description: "Oat Catalog with 35+ components (inline stub)",
          },
        ];
      }

      const resp = await fetch(`${AGENTS_BASE}${agentUrl}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ metadata, message: "Show me the dashboard" }),
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || `Agent error: ${resp.status}`);
      }

      const dataPart = await resp.json();
      log(`  Received DataPart (${dataPart.data?.length ?? 0} messages)`, "ok");
      return dataPart;
    }

    // -----------------------------------------------------------------------
    // Step 3: Render A2UI DataParts using OatRenderer
    // -----------------------------------------------------------------------

    /**
     * Build a RenderContext shim for OatRenderer. Each surface gets its own
     * data model and component map, enforcing A2A surface isolation (Section 9.5).
     */
    function makeRenderContext(dataModel, componentMap) {
      return {
        getDataModel: () => dataModel,
        setDataModel: (path, val) => {
          const parts = path.replace(/^\//, '').split('/');
          let cur = dataModel;
          for (let i = 0; i < parts.length - 1; i++) {
            if (!cur[parts[i]]) cur[parts[i]] = {};
            cur = cur[parts[i]];
          }
          cur[parts[parts.length - 1]] = val;
        },
        subscribe: () => () => {},
        renderChild: (id) => {
          const child = componentMap.get(id);
          if (!child) return document.createTextNode('');
          return renderer.renderComponent(child, makeRenderContext(dataModel, componentMap));
        },
        dispatchAction: (action) => console.log('[A2UI] action', action),
        getRegisteredFunction: () => null,
      };
    }

    function renderDataPart(dataPart, containerEl) {
      const messages = dataPart.data ?? [];
      let data = {};
      let components = [];

      for (const msg of messages) {
        if (msg.createSurface) {
          log(`  Surface created: ${msg.createSurface.surfaceId} (catalog: ${msg.createSurface.catalogId})`);
        }
        if (msg.updateDataModel) {
          data = { ...data, ...msg.updateDataModel.data };
        }
        if (msg.updateComponents) {
          components = msg.updateComponents.components;
        }
      }

      // Build a Map for O(1) child lookups during rendering
      const componentMap = new Map(components.map((c) => [c.id, c]));

      // Find root: the first component not referenced as a child of another
      const childIds = new Set();
      for (const comp of components) {
        for (const cid of comp.children ?? []) childIds.add(cid);
      }
      const root = components.find((c) => !childIds.has(c.id));

      if (root) {
        containerEl.innerHTML = "";
        const ctx = makeRenderContext(data, componentMap);
        containerEl.appendChild(renderer.renderComponent(root, ctx));
        log(`  Rendered ${components.length} components`, "ok");
      } else {
        containerEl.textContent = "No root component found";
        log("  No root component found", "err");
      }
    }

    // -----------------------------------------------------------------------
    // Step 4: Orchestrate the full flow
    // -----------------------------------------------------------------------

    async function run() {
      log("=== A2A Multi-Agent Demo ===");
      log("Starting agent discovery and catalog negotiation...");

      try {
        // Discover both agents in parallel
        const [cardA, cardB] = await Promise.all([
          discoverAgent("/.well-known/agent-a.json"),
          discoverAgent("/.well-known/agent-b.json"),
        ]);

        log("--- Catalog Negotiation ---");

        // Send messages with catalog metadata (Section 9.2)
        const [dataPartA, dataPartB] = await Promise.all([
          sendMessage(cardA.url, cardA),
          sendMessage(cardB.url, cardB),
        ]);

        log("--- Rendering Surfaces (Section 9.5: Isolated Ownership) ---");

        // Each surface is rendered in its own container -- surface ownership
        // isolation means Agent A's components cannot access Agent B's data
        // model and vice versa (Section 9.5).
        renderDataPart(dataPartA, document.getElementById("surface-metrics"));
        renderDataPart(dataPartB, document.getElementById("surface-incidents"));

        log("=== Demo Complete ===", "ok");
      } catch (err) {
        log(`Error: ${err.message}`, "err");
        log(
          "Make sure mock-agents.js is running: node mock-agents.js",
          "warn"
        );
      }
    }

    run();
  </script>
</body>
</html>
